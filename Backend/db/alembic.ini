# Alembic Configuration File
# Cấu hình migration cho thư viện Alembic

[alembic]
# Đường dẫn tới thư mục chứa các migration scripts
script_location = versions

# Template cho tên file migration
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone cho migration
# timezone =

# Chuỗi kết nối database (sẽ được override bởi env.py)
sqlalchemy.url = postgresql://user:password@localhost:5432/viettel_db

[post_write_hooks]
# Hooks chạy sau khi tạo migration mới

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
